<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R.K Dry Fruit Store</title>

    <!-- Preconnect: establishes TCP connection to backend BEFORE React loads -->
    <link rel="preconnect" href="https://ecom-backend-s3h9.onrender.com" />
    <link rel="dns-prefetch" href="https://ecom-backend-s3h9.onrender.com" />

    <!-- Preconnect to Cloudinary for images -->
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Start API call IMMEDIATELY — runs in parallel with JS bundle download -->
    <script>
      window.__productsPromise = fetch(
        'https://ecom-backend-s3h9.onrender.com/api/products'
      )
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
    </script>
  </head>
  <body>
    <!-- Visible immediately before React loads — no blank screen -->
    <div id="initial-loader" style="
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
      font-size: 1.4rem;
      gap: 1rem;
      z-index: 99999;
    ">
      <span style="font-size: 3rem">🌰</span>
      <span>R.K Dry Fruit Store</span>
      <span style="font-size: 0.9rem; color: #94a3b8;">Loading store...</span>
    </div>

    <div id="root"></div>

    <!-- Hide loader once React mounts -->
    <script>
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.transition = 'opacity 0.3s ease';
            loader.style.opacity = '0';
            setTimeout(function() { loader.remove(); }, 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
